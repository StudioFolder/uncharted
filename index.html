<!DOCTYPE html>
<html class="no-js" lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>Uncharted</title>
    <meta property="og:image" content="https://uncharted.ooo/images/explore/svalbardfb.jpg" />
    <meta property="og:title" content="Uncharted" />
    <meta property="og:url" content="https://uncharted.ooo" />
    <link rel="icon" type="image/png" href="icon.png" />
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/common.css">

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,900" rel="stylesheet">

    <script type="text/javascript">
      var anno = Math.floor((Math.random() * 45) + 1972);
    </script>
  </head>

  <body>

    <div class="nulla">
      <h1>Uncharted</h1>
      <p class="text noMobile">A research project examining the infrastructure behind contemporary cartography</p>

      <button type="button" onclick="window.location.href='explore.html'">Explore</button>
    </div>

    <h3 id="year"> </h3>


    <script id="vertexShader" type="x-shader/x-vertex">
			uniform vec3 viewVector;
			uniform float c;
			uniform float p;
			varying float intensity;

			void main() {
				vec3 vNormal = normalize( normalMatrix * normal );
				vec3 vNormel = normalize( normalMatrix * viewVector );
				intensity = pow( c - dot(vNormal, vNormel), p );

				gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
			}
		</script>

		<script id="fragmentShader" type="x-shader/x-fragment">
			uniform vec3 glowColor;
			varying float intensity;

		  void main() {
		  	vec3 glow = glowColor * intensity;
    		gl_FragColor = vec4( glow, 0.1 );
		  }
		</script>

    <script type="text/javascript">

      var bottoni = [];
      bottoni [0]= '<button class="small_btn" id="minus">&mdash;</button>';
      bottoni [1]= '<button class="small_btn" id="plus">+</button>';

      var year = document.getElementById('year');
      year.innerHTML= 'Landsat global coverage '+bottoni[0]+anno+bottoni[1];

    </script>

    <script type='text/javascript' src='js/tween.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r63/three.min.js'></script>
    <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/123941/orbitcontrols.js'></script>
    <script src="js/index.js"> </script>

  </body>
</html>
